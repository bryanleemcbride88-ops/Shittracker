
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE SHIT TRACKER 3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFD600;
            --brown: #5C3A1E;
            --dark-brown: #1a0e05;
            --orange: #FF6B00;
            --tan: #d4aa7d;
            --green: #39FF14;
            --red: #FF3131;
            --bg: #140c04;
            --card-bg: #1f1208;
            --border: #5C3A1E;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,214,0,0.025) 49px, rgba(255,214,0,0.025) 50px), repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,214,0,0.025) 49px, rgba(255,214,0,0.025) 50px);
            color: var(--tan);
            min-height: 100vh;
            padding-bottom: 60px;
        }
        header {
            background: linear-gradient(180deg, #2a1500 0%, #0d0600 100%);
            border-bottom: 4px solid var(--yellow);
            padding: 18px 20px 14px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(255,107,0,0.25);
        }
        h1 {
            font-family: 'Black Ops One', cursive;
            font-size: clamp(1.5rem, 4vw, 2.8rem);
            color: var(--yellow);
            text-shadow: 3px 3px 0 #5C3A1E, 0 0 30px rgba(255,214,0,0.35);
            letter-spacing: 2px;
        }
        .tagline {
            font-size: 0.68rem;
            color: var(--orange);
            letter-spacing: 4px;
            margin-top: 4px;
        }
        .status-banner {
            font-size: 0.75rem;
            padding: 6px 12px;
            margin-top: 8px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-banner.connected {
            background: rgba(57,255,20,0.15);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .status-banner.disconnected {
            background: rgba(255,49,49,0.15);
            color: var(--red);
            border: 1px solid var(--red);
        }
        .ticker-wrap {
            background: var(--yellow);
            overflow: hidden;
            padding: 5px 0;
            border-bottom: 3px solid var(--brown);
        }
        .ticker-track {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
            font-family: 'Black Ops One', cursive;
            font-size: 0.8rem;
            color: #1a0e05;
        }
        @keyframes ticker {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 18px 14px;
        }
        .tally-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        @media(max-width:500px) {
            .tally-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .tally-box {
            background: #0d0700;
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
        }
        .tally-num {
            font-family: 'Black Ops One', cursive;
            font-size: 1.8rem;
            color: var(--yellow);
            line-height: 1;
        }
        .tally-lbl {
            font-size: 0.6rem;
            color: #8a6a4a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px;
        }
        .shame-banner {
            background: linear-gradient(135deg, #300000, #1a0000);
            border: 3px solid var(--red);
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .shame-title {
            font-family: 'Black Ops One', cursive;
            color: var(--red);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .shame-name {
            font-family: 'Black Ops One', cursive;
            color: var(--yellow);
            font-size: 1.6rem;
            margin: 8px 0;
        }
        .shame-sub {
            font-size: 0.75rem;
            color: var(--tan);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
        }
        .tab-btn {
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: var(--tan);
            cursor: pointer;
            font-family: 'Black Ops One', cursive;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--yellow);
            border-bottom-color: var(--yellow);
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
        .worker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }
        .worker-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            transition: all 0.3s;
        }
        .worker-card.active-session {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(57,255,20,0.2);
        }
        .worker-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .worker-name {
            font-family: 'Black Ops One', cursive;
            color: var(--yellow);
            font-size: 1.1rem;
        }
        .worker-nickname {
            color: var(--orange);
        }
        .worker-rank {
            font-size: 0.7rem;
            color: #8a6a4a;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-pill {
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-pill.on {
            background: rgba(57,255,20,0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .status-pill.off {
            background: rgba(212,170,125,0.1);
            color: var(--tan);
            border: 1px solid var(--tan);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat-box {
            background: #0d0700;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #8a6a4a;
            text-transform: uppercase;
        }
        .stat-val {
            font-family: 'Black Ops One', cursive;
            font-size: 1.2rem;
            color: var(--tan);
            margin-top: 2px;
        }
        .stat-val.hi {
            color: var(--yellow);
        }
        .live-timer {
            padding: 8px;
            background: rgba(57,255,20,0.1);
            border: 1px solid var(--green);
            border-radius: 4px;
            text-align: center;
            color: var(--green);
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: none;
        }
        .live-timer.show {
            display: block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Black Ops One', cursive;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-in {
            background: var(--green);
            color: #1a0e05;
        }
        .btn-in:hover:not(:disabled) {
            background: #2ce600;
            transform: scale(1.05);
        }
        .btn-in:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-out {
            background: var(--yellow);
            color: #1a0e05;
        }
        .btn-out:hover:not(:disabled) {
            background: #ffd000;
            transform: scale(1.05);
        }
        .btn-out:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-photo {
            background: var(--orange);
            color: #1a0e05;
        }
        .btn-photo:hover {
            background: #ff7a1a;
            transform: scale(1.05);
        }
        .last-seen {
            font-size: 0.7rem;
            color: #8a6a4a;
        }
        .lb-row {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            align-items: center;
            margin-bottom: 8px;
        }
        .lb-rank {
            font-family: 'Black Ops One', cursive;
            font-size: 1.4rem;
            min-width: 30px;
            text-align: center;
        }
        .lb-rank.gold {
            color: #FFD600;
        }
        .lb-rank.silver {
            color: #C0C0C0;
        }
        .lb-rank.bronze {
            color: #CD7F32;
        }
        .lb-name {
            font-family: 'Black Ops One', cursive;
            color: var(--yellow);
            font-size: 0.95rem;
        }
        .lb-title {
            font-size: 0.7rem;
            color: #8a6a4a;
        }
        .lb-bar-wrap {
            background: #0d0700;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .lb-bar {
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            height: 100%;
        }
        .lb-time {
            font-family: 'Black Ops One', cursive;
            color: var(--yellow);
            font-size: 0.9rem;
        }
        .lb-sessions {
            font-size: 0.7rem;
            color: #8a6a4a;
        }
        .log-entry {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--card-bg);
            border-left: 3px solid var(--border);
            border-radius: 4px;
            margin-bottom: 8px;
            align-items: flex-start;
        }
        .log-icon {
            font-size: 1.4rem;
            min-width: 30px;
        }
        .log-body {
            flex: 1;
        }
        .log-name {
            font-family: 'Black Ops One', cursive;
            color: var(--yellow);
            font-size: 0.9rem;
        }
        .log-ts {
            font-size: 0.7rem;
            color: #8a6a4a;
        }
        .log-detail {
            font-size: 0.8rem;
            color: var(--tan);
            margin-top: 2px;
        }
        .log-dur {
            font-size: 0.75rem;
            color: var(--orange);
            margin-top: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8a6a4a;
        }
        .empty-state .big {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>SITE SHIT TRACKER 3000</h1>
        <div class="tagline">LIVE CREW EDITION</div>
        <div id="statusBanner" class="status-banner connected">LIVE - ALL CREW SYNCED IN REAL TIME</div>
    </header>
    <div class="ticker-wrap">
